version: '3.9'

networks:
  microservices:

volumes:
  mysql_data:
  mysql_wp_data:
  mongo_data:
  postgres_data:
  sqlserver_csharp_data:
  sqlserver_vb_data:
  oracle_data:

services:

  nginx:
    image: nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - microservices

  # LARAVEL + MYSQL
  laravel:
    build: ./services/laravel
    ports:
      - "${LARAVEL_PORT}:8000"
    depends_on:
      - mysql
    networks:
      - microservices

  mysql:
    image: mysql:8
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - microservices

  # WORDPRESS
  wordpress:
    image: wordpress
    ports:
      - "${WORDPRESS_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: mysql_wp:3306
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASS}
      WORDPRESS_DB_NAME: ${WP_DB_NAME}
    depends_on:
      - mysql_wp
    networks:
      - microservices

  mysql_wp:
    image: mysql:8
    ports:
      - "${MYSQL_WP_PORT}:3306"
    environment:
      MYSQL_DATABASE: ${WP_DB_NAME}
      MYSQL_USER: ${WP_DB_USER}
      MYSQL_PASSWORD: ${WP_DB_PASS}
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_wp_data:/var/lib/mysql
    networks:
      - microservices

  # NODE + MONGO
  node:
    build: ./services/node
    ports:
      - "${NODE_PORT}:3000"
    depends_on:
      - mongo
    networks:
      - microservices

  mongo:
    image: mongo
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - microservices

  # PYTHON + POSTGRES
  python:
    build: ./services/python
    ports:
      - "${PYTHON_PORT}:8000"
    depends_on:
      - postgres
    networks:
      - microservices

  postgres:
    image: postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - microservices

  # .NET C#
  dotnet_csharp:
    build: ./services/dotnet-csharp
    ports:
      - "${CSHARP_PORT}:80"
    depends_on:
      - sqlserver_csharp
    networks:
      - microservices

  sqlserver_csharp:
    image: mcr.microsoft.com/mssql/server
    ports:
      - "${SQLSERVER_CSHARP_PORT}:1433"
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    volumes:
      - sqlserver_csharp_data:/var/opt/mssql
    networks:
      - microservices

  # .NET VB
  dotnet_vb:
    build: ./services/dotnet-vb
    ports:
      - "${VB_PORT}:80"
    depends_on:
      - sqlserver_vb
    networks:
      - microservices

  sqlserver_vb:
    image: mcr.microsoft.com/mssql/server
    ports:
      - "${SQLSERVER_VB_PORT}:1433"
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    volumes:
      - sqlserver_vb_data:/var/opt/mssql
    networks:
      - microservices

  # JAVA + ORACLE
  java:
    build: ./services/java
    ports:
      - "${JAVA_PORT}:8080"
    depends_on:
      - oracle
    networks:
      - microservices

  oracle:
    image: gvenzl/oracle-xe
    ports:
      - "${ORACLE_PORT}:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - microservices
  
  # Codeignite + mysql + sqlserver + mongo
  codeigniter:
  build: ./services/codeigniter
  ports:
    - "${CODEIGNITER_PORT}:80"
  depends_on:
    - mysql
    - sqlserver_csharp
    - mongo
  networks:
    - microservices

  # RABBITMQ
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_UI_PORT}:15672"
    networks:
      - microservices

  # PROMETHEUS
  prometheus:
    image: prom/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    networks:
      - microservices

  # GRAFANA
  grafana:
    image: grafana/grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    networks:
      - microservices